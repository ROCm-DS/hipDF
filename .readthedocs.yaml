version: 2

sphinx:
  configuration: docs/conf.py

formats: []

python:asdasd
  install:
  - requirements: docs/sphinx/requirements.txt

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  commands:
    - mkdir --parents _readthedocs/html/
    - cp --recursive docs/_build/html/* _readthedocs/html/

