[build-system]
build-backend = "setuptools.build_meta"
requires = [
    "setuptools",
    "wheel",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project]
name = "amd-dask_hipdf"
version = "1.0.00"
description = "Utilities for Dask and cuDF interactions"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [
    { name = "Advanced Micro Devices, Inc." },
    { name = "NVIDIA Corporation" },
]
license = { text = "Apache 2.0" }
requires-python = ">=3.9"
dependencies = [
    "amd-hipdf>=1.0,<2.0",
    "amd-cupy-for-rocmds>=13.0.0.b1",
    "dask>=2023.0.0",
    "distributed", # TODO(HIP/AMD): AMD-AI/distributed@rocm-dev seems to be too old, causes problems
    #: "distributed @ git+https://github.com/AMD-AI/distributed@rocm-dev", TODO(HIP/AMD): causes trouble in some tests
    "fsspec>=0.6.0",
    "numpy>=1.21,<1.25",
    "pandas>=1.3,<1.6.0dev0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.
classifiers = [
    "Intended Audience :: Developers",
    "Topic :: Database",
    "Topic :: Scientific/Engineering",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
]
dynamic = ["entry-points"]

[project.optional-dependencies]
test = [
    "dask-hip @ git+https://github.com/rocm/dask-hip@branch-24.06",
    #: "distributed @ git+https://github.com/AMD-AI/distributed@rocm-dev",
    #: "dask-cuda==23.10.*", #: NOTE(HIP/AMD): assumed to be installed
    #: "numba>=0.57,<=0.58", #: NOTE(HIP/AMD): assumed to be installed
    "pytest",
    "pytest-cov",
    "pytest-xdist",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit ../../dependencies.yaml and run `rapids-dependency-file-generator`.

[project.urls]
Homepage = "https://github.com/rocm/hipdf"

[tool.setuptools]
license-files = ["LICENSE"]

[tool.isort]
line_length = 79
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
combine_as_imports = true
order_by_type = true

known_dask = [
    "dask",
    "distributed",
    "dask_cuda",
]
known_rapids = [
    "rmm",
    "cudf",
]
known_first_party = [
    "dask_cudf",
]

default_section = "THIRDPARTY"
sections = [
    "FUTURE",
    "STDLIB",
    "THIRDPARTY",
    "DASK",
    "RAPIDS",
    "FIRSTPARTY",
    "LOCALFOLDER",
]
skip = [
    "thirdparty",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".tox",
    ".venv",
    "_build",
    "buck-out",
    "build",
    "dist",
]
